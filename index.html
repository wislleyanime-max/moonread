<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonRead</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">🌙 MoonRead</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Series</a>
        <a href="#">Genres</a>
        <a href="#">Login</a>
    </nav>
</header>

<section class="banner">
    <div class="banner-content">
        <h1>Bem-vindo ao MoonRead</h1>
        <p>Seu portal de mangás favorito</p>
        <button>Explorar Agora</button>
    </div>
</section>

<section class="grid">

    <div class="card">
        <img src="https://picsum.photos/300/400?random=1">
        <div class="card-info">
            <h3>Naruto</h3>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/400?random=2">
        <div class="card-info">
            <h3>One Piece</h3>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/400?random=3">
        <div class="card-info">
            <h3>Attack on Titan</h3>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/400?random=4">
        <div class="card-info">
            <h3>Demon Slayer</h3>
        </div>
    </div>

</section>

</body>
</html>
